<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My API</title>

    <style>
      :root {
        --bg1: #667eea;
        --bg2: #764ba2;
        --card-bg: rgba(255, 255, 255, 0.12);
        --text: white;
        --btn-bg: white;
        --btn-text: #5a67d8;
      }

      body.light {
        --bg1: #f6f9ff;
        --bg2: #e9efff;
        --card-bg: rgba(255, 255, 255, 0.85);
        --text: #1a202c;
        --btn-bg: #5a67d8;
        --btn-text: white;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        background: linear-gradient(135deg, var(--bg1), var(--bg2));
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        transition: all 0.3s ease;
        animation: gradientMove 12s ease infinite;
        background-size: 200% 200%;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .card {
        background: var(--card-bg);
        backdrop-filter: blur(14px);
        padding: 42px;
        border-radius: 18px;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        max-width: 460px;
        width: 92%;
      }

      .logo {
        margin-bottom: 10px;
      }

      img {
        width: 100px;
      }

      .badges {
        margin-bottom: 20px;
      }

      .badge {
        display: inline-block;
        padding: 4px 10px;
        margin: 4px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        background: rgba(0, 0, 0, 0.2);
      }

      .status {
        color: #48ff9b;
      }

      h1 {
        margin: 10px 0 8px;
        font-size: 2rem;
      }

      p {
        opacity: 0.9;
        margin-bottom: 30px;
      }

      .buttons a {
        display: inline-block;
        margin: 6px;
        padding: 13px 26px;
        background: var(--btn-bg);
        color: var(--btn-text);
        text-decoration: none;
        border-radius: 999px;
        font-weight: 600;
        transition: all 0.2s ease;
      }

      .buttons a:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
      }

      .toggle {
        position: fixed;
        top: 18px;
        right: 18px;
        cursor: pointer;
        font-size: 22px;
        opacity: 0.85;
      }

      .footer {
        margin-top: 24px;
        font-size: 0.85rem;
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <div class="toggle" onclick="toggleTheme()">🌓</div>

    <div class="card">
      <div class="logo"><img src="./assets/logo.png" alt=""></div>
      <h1>Questify</h1>

      <div class="badges">
        <span class="badge">API {{ api_version }}</span>
        <span class="badge">{{ environment }}</span>
        <span class="badge status">● Healthy</span>
      </div>

      <p>Questify backend service is running successfully.</p>

      <div class="buttons">
        <a href="/docs">Swagger Docs</a>
        <a href="/redoc">ReDoc</a>
      </div>

      <div class="footer">Powered by FastAPI</div>
    </div>

    <script>
      function toggleTheme() {
        document.body.classList.toggle("light");
        localStorage.setItem(
          "theme",
          document.body.classList.contains("light") ? "light" : "dark",
        );
      }

      (function () {
        const saved = localStorage.getItem("theme");
        const prefersLight = window.matchMedia(
          "(prefers-color-scheme: light)",
        ).matches;
        if (saved === "light" || (!saved && prefersLight)) {
          document.body.classList.add("light");
        }
      })();
    </script>
  </body>
</html>
